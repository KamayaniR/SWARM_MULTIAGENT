# Pomerium config — identity-aware proxy in front of the Swarm Control dashboard.
#
# Pomerium sits in front of orchestrator/server.py (uvicorn, :8000), forces a
# login, and only forwards requests from allowed identities. server.py itself
# stays unchanged — anything that reaches it is already authenticated.
#
# Local demo domains: *.localhost.pomerium.io resolves to 127.0.0.1, so no
# /etc/hosts edits or DNS are needed. Browse to https://swarm.localhost.pomerium.io
# (accept the self-signed cert warning) and Pomerium will bounce you through login.

authenticate_service_url: https://authenticate.localhost.pomerium.io

# ---- Secrets (populate via .env.pomerium; see pomerium/README.md) -----------
# Generate each with:  head -c32 /dev/urandom | base64
shared_secret: ${POMERIUM_SHARED_SECRET}
cookie_secret: ${POMERIUM_COOKIE_SECRET}

# ---- Identity provider ------------------------------------------------------
# GitHub OAuth App: https://github.com/settings/developers
#   Homepage URL:            https://authenticate.localhost.pomerium.io
#   Authorization callback:  https://authenticate.localhost.pomerium.io/oauth2/callback
idp_provider: github
idp_client_id: ${GITHUB_CLIENT_ID}
idp_client_secret: ${GITHUB_CLIENT_SECRET}

# Self-signed certs for the local demo (generated by pomerium/gen-certs.sh).
certificate_file: /pomerium/certs/localhost.pomerium.io.crt
certificate_key_file: /pomerium/certs/localhost.pomerium.io.key

routes:
  # The Swarm Control dashboard + REST API + live-event WebSocket.
  - from: https://swarm.localhost.pomerium.io
    to: http://host.docker.internal:8000
    # server.py streams live agent events over /ws/events — without this the
    # dashboard connects but never receives updates behind the proxy.
    allow_websocket_upgrade: true
    policy:
      - allow:
          or:
            # Lock down to your GitHub-verified email. Add more entries, or
            # swap for `authenticated_user: {}` to allow any logged-in GitHub user.
            - email:
                is: ${SWARM_ALLOWED_EMAIL}
